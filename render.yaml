services:
  - type: web
    name: investai-backend-g5  
    env: python
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port 10000"
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: investai-db-g5 
          property: connectionString

databases:
  - name: investai-db-g5  
    plan: free
    postgresMajorVersion: 16